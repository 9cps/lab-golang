services:
  postgres:
    image: postgres:16-alpine
    container_name: lab_golang_postgres
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${USER_DB:-root}
      POSTGRES_PASSWORD: ${PASSWORD_DB:-root}
      POSTGRES_DB: ${DATABASE_NAME:-lab-golang}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB:-root} -d ${DATABASE_NAME:-lab-golang}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  expenses-service:
    build:
      context: .
      dockerfile: Dockerfile.expenses
    container_name: lab_golang_expenses_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    working_dir: /app
    command:
      - sh
      - -c
      - |
        ./migrate && ./expenses-server
    environment:
      SERVER_ADDR: ":8081"
      SERVER_NAME: postgres
      SERVER_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-lab-golang}
      USER_DB: ${USER_DB:-root}
      PASSWORD_DB: ${PASSWORD_DB:-root}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: lab_golang_api_gateway
    restart: unless-stopped
    depends_on:
      expenses-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: ":8080"
      EXPENSES_SERVICE_URL: "http://expenses-service:8081"
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

volumes:
  postgres_data:
